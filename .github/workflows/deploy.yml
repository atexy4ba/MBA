name: Deploy to Octenium

on:
  push:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: mba_ecom_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npx drizzle-kit migrate --config drizzle.config.ts
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: mba_ecom_test

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: mba_ecom_test
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: true

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prerender static pages
        run: node scripts/prerender.mjs
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          BASE_URL: https://madebyalgerians.com

      - name: Install production deps
        run: npm ci --omit=dev

      - name: Deploy to Octenium via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.OCENIUM_SFTP_HOST }}
          port: ${{ secrets.OCENIUM_SFTP_PORT }}
          username: ${{ secrets.OCENIUM_SFTP_USER }}
          password: ${{ secrets.OCENIUM_SFTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ./
          exclude: |
            .git/**
            .github/**
            node_modules/.cache/**
            src/**
            scripts/**
            **/*.ts
            **/*.tsx
            **/*.spec.ts
            **/*.test.ts
            !dist/**
            !dist-server/**
            !server.cjs
            !package.json
            !package-lock.json
            !public/**
            !.env.production
